<!DOCTYPE html> 
<html>
    <head>
<title>NovaMart</title>
<div id="header-placeholder"></div>
        <link rel="stylesheet" href="/estilos/estiloPagPrincipal.css">     
    </head>
    <body>
    <div id="header-placeholder"></div>
    <main>
        <section class="principal">
        
            <div class="texto">
                <h1>Tu tienda de abarrotes en línea</h1>
                <p>
                    Compra fácil, rápido y desde la comodidad de tu hogar.
                </p>
                <a href="productos.html" class="boton">
                    Ver productos
                </a>
            </div>

            <div class="banner">
                <img src="img/banner.png">
            </div>

        </section>

        <section class="beneficios">
            <div class="descripcion">
                <h3>🛍 Productos de calidad</h3>
                <p>Gran variedad para tu hogar.</p>
            </div>

            <div class="descripcion">
                <h3>🚚 Envío a domicilio</h3>
                <p>Gratis en compras mayores a $200.</p>
            </div>

            <div class="descripcion">
                <h3>💳 Pago al recibir</h3>
                <p>Compra con total seguridad.</p>
            </div>
        </section>

    </main>
    <div id="footer-placeholder"></div>









    


    <script>
        fetch('../PagHeader/header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById
            ('header-placeholder').innerHTML=data;
        }
        )
        </script>
    <script>
        fetch('../PagHeader/footer.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById
            ('footer-placeholder').innerHTML=data;
        }
        )
        </script>
        
</html>
