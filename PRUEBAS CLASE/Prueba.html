<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diseño</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f5f5;
}

.card{
    height:100%;
}

.img-placeholder{
    height:250px;
    border:2px dashed #999;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    color:#999;
}

.contenido{
    height:250px;
    border:2px dashed #999;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="#">Navbar</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- FILA SUPERIOR -->
    <div class="row mb-4">

        <div class="col-md-3">
            <div class="card p-4 text-center">
                Col-3
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-4 text-center">
                📷
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4">
            </div>
        </div>

    </div>

    <!-- FILA INFERIOR -->
    <div class="row">

        <!-- TARJETA IZQUIERDA -->
        <div class="col-md-6">

            <div class="card">

                <div class="card-header">
                    Imagen
                </div>

                <div class="card-body">

                    <div class="img-placeholder">
                        ✕
                    </div>

                </div>

            </div>

        </div>

        <!-- TARJETA DERECHA -->
        <div class="col-md-6">

            <div class="card">

                <div class="card-header">
                    Título
                </div>

                <div class="card-body">

                    <div class="contenido">

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
